<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="56 16 160 176" width="550" height="880">
  <title>Phoenix T13D0 - Closed-loop alien pattern 18</title>
  <desc>
    Animated reconstruction of Phoenix ROM table T13D0 ($13D0-$13FB).
    Each pattern byte indexes T1700 for a (dX, dY) pair; each step is held until
    a character-cell border is crossed. Opcodes 07-0A use dy=+/-2 so net is 4x delta;
    other |d|=4 opcodes net 2x delta. Forms a closed loop.
  </desc>

  <defs>
    <pattern id="grid" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 8 0 L 0 0 0 8" fill="none" stroke="#1e3a2f" stroke-width="0.4"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Start (160,32); 43 steps; returns to start -->
    <path id="flight"
      d="M 160,32 l 8,0 8,0 8,8 0,8 0,8 0,8 0,8 -16,8 -16,8 -16,8 16,8 -16,8 -16,8 -16,8 16,8 -16,8 -16,8 -16,8 0,8 8,8 8,0 8,0 8,0 8,0 8,0 8,-8 0,-8 0,-8 -16,-8 16,-8 16,-8 16,-8 -16,-8 16,-8 16,-8 16,-8 -16,-8 -16,-8 0,-8 0,-8 0,-8 0,-8 0,-8 Z"/>
  </defs>

  <style>
    .label { font-family: "Segoe UI", system-ui, sans-serif; fill: #9ecbb8; }
    .title { font-size: 6.5px; font-weight: 600; letter-spacing: 0.04em; }
    .meta  { font-size: 4.2px; fill: #6a9a86; }
    .trail {
      fill: none;
      stroke: #3ecf8e;
      stroke-width: 1.2;
      stroke-linejoin: round;
      stroke-linecap: round;
      opacity: 0.85;
      filter: url(#glow);
      stroke-dasharray: 480;
      stroke-dashoffset: 480;
      animation: draw 13s linear infinite;
    }
    @keyframes draw {
      0%   { stroke-dashoffset: 480; opacity: 0.35; }
      8%   { opacity: 0.9; }
      92%  { opacity: 0.9; }
      100% { stroke-dashoffset: 0; opacity: 0.35; }
    }
  </style>

  <rect x="56" y="16" width="160" height="176" fill="#0a1410"/>
  <rect x="64" y="24" width="144" height="160" fill="url(#grid)" stroke="#2a5644" stroke-width="0.6"/>

  <g fill="#cfe8d8" opacity="0.35">
    <circle cx="75" cy="30" r="0.4"/>
    <circle cx="120" cy="70" r="0.3"/>
    <circle cx="190" cy="40" r="0.35"/>
    <circle cx="200" cy="120" r="0.3"/>
    <circle cx="90" cy="165" r="0.35"/>
    <circle cx="180" cy="175" r="0.3"/>
  </g>

  <text x="68" y="22" class="label title">PHOENIX  -  T13D0 PATTERN #18</text>
  <text x="68" y="188" class="label meta">Closed loop - T1700 deltas - cell-boundary steps - $13D0-$13FB</text>

  <use href="#flight" fill="none" stroke="#1f5c43" stroke-width="1.4" opacity="0.55"/>

  <path class="trail"
    d="M 160,32 l 8,0 8,0 8,8 0,8 0,8 0,8 0,8 -16,8 -16,8 -16,8 16,8 -16,8 -16,8 -16,8 16,8 -16,8 -16,8 -16,8 0,8 8,8 8,0 8,0 8,0 8,0 8,0 8,-8 0,-8 0,-8 -16,-8 16,-8 16,-8 16,-8 -16,-8 16,-8 16,-8 16,-8 -16,-8 -16,-8 0,-8 0,-8 0,-8 0,-8 0,-8 Z"/>

  <circle cx="160" cy="32" r="1.6" fill="#f0d878" stroke="#a89030" stroke-width="0.35">
    <title>Start / end (160, 32)</title>
  </circle>
  <text x="164" y="31" class="label meta">start</text>

  <g filter="url(#glow)">
    <g>
      <rect x="-3" y="-2.5" width="6" height="5" rx="0.6" fill="#ff6b4a"/>
      <rect x="-4.5" y="-0.5" width="1.5" height="2" fill="#ff9a7a"/>
      <rect x="3" y="-0.5" width="1.5" height="2" fill="#ff9a7a"/>
      <circle cx="-1.2" cy="-0.6" r="0.55" fill="#1a0a08"/>
      <circle cx="1.2" cy="-0.6" r="0.55" fill="#1a0a08"/>
      <animateMotion dur="13s" repeatCount="indefinite" rotate="auto">
        <mpath href="#flight"/>
      </animateMotion>
    </g>
  </g>

  <g class="label meta" opacity="0.8">
    <text x="170" y="50">entry</text>
    <text x="90" y="130">zigzag left</text>
    <text x="155" y="100">climb</text>
  </g>
</svg>
