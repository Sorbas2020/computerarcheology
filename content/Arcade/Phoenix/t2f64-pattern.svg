<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="48 24 192 160" width="550" height="800">
  <title>Phoenix T2F64 - Closed-loop alien pattern (part 2)</title>
  <desc>
    Animated reconstruction of Phoenix ROM table T2F64 ($2F64-$2F96).
    Each pattern byte indexes T1700 for a (dX, dY) pair; each step is held until
    a character-cell border is crossed. Opcodes 07-08 use dy=-2 so net is 4x delta;
    other |d|=4 opcodes net 2x delta. Forms a closed loop.
  </desc>

  <defs>
    <pattern id="grid" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 8 0 L 0 0 0 8" fill="none" stroke="#1e3a2f" stroke-width="0.4"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Start (64,40); 50 steps; returns to start -->
    <path id="flight"
      d="M 64,40 l 0,8 0,8 0,8 0,8 0,8 0,8 8,8 8,0 8,8 0,8 8,8 8,0 8,8 0,8 8,8 8,0 8,8 0,8 8,8 8,-8 -8,-8 -8,8 8,8 8,0 8,0 8,0 8,-8 0,-8 8,-8 8,0 8,8 0,8 8,8 8,0 8,-8 0,-8 -16,-8 -16,-8 -16,-8 -16,-8 -16,-8 -16,-8 -16,-8 16,-8 16,-8 -16,-8 -16,-8 -16,-8 -16,-8 -16,-8 Z"/>
  </defs>

  <style>
    .label { font-family: "Segoe UI", system-ui, sans-serif; fill: #9ecbb8; }
    .title { font-size: 6.5px; font-weight: 600; letter-spacing: 0.04em; }
    .meta  { font-size: 4.2px; fill: #6a9a86; }
    .trail {
      fill: none;
      stroke: #3ecf8e;
      stroke-width: 1.1;
      stroke-linejoin: round;
      stroke-linecap: round;
      opacity: 0.85;
      filter: url(#glow);
      stroke-dasharray: 520;
      stroke-dashoffset: 520;
      animation: draw 14s linear infinite;
    }
    @keyframes draw {
      0%   { stroke-dashoffset: 520; opacity: 0.35; }
      8%   { opacity: 0.9; }
      92%  { opacity: 0.9; }
      100% { stroke-dashoffset: 0; opacity: 0.35; }
    }
  </style>

  <rect x="48" y="24" width="192" height="160" fill="#0a1410"/>
  <rect x="56" y="32" width="176" height="144" fill="url(#grid)" stroke="#2a5644" stroke-width="0.6"/>

  <g fill="#cfe8d8" opacity="0.35">
    <circle cx="70" cy="40" r="0.4"/>
    <circle cx="120" cy="80" r="0.3"/>
    <circle cx="200" cy="50" r="0.35"/>
    <circle cx="220" cy="160" r="0.3"/>
  </g>

  <text x="60" y="30" class="label title">PHOENIX  -  T2F64 PATTERN #35</text>
  <text x="60" y="180" class="label meta">Closed loop - T1700 deltas - cell-boundary steps - $2F64-$2F96</text>

  <use href="#flight" fill="none" stroke="#1f5c43" stroke-width="1.4" opacity="0.55"/>

  <path class="trail"
    d="M 64,40 l 0,8 0,8 0,8 0,8 0,8 0,8 8,8 8,0 8,8 0,8 8,8 8,0 8,8 0,8 8,8 8,0 8,8 0,8 8,8 8,-8 -8,-8 -8,8 8,8 8,0 8,0 8,0 8,-8 0,-8 8,-8 8,0 8,8 0,8 8,8 8,0 8,-8 0,-8 -16,-8 -16,-8 -16,-8 -16,-8 -16,-8 -16,-8 -16,-8 16,-8 16,-8 -16,-8 -16,-8 -16,-8 -16,-8 -16,-8 Z"/>

  <circle cx="64" cy="40" r="1.6" fill="#f0d878" stroke="#a89030" stroke-width="0.35">
    <title>Start / end (64, 40)</title>
  </circle>
  <text x="68" y="39" class="label meta">start</text>

  <g filter="url(#glow)">
    <g>
      <rect x="-3" y="-2.5" width="6" height="5" rx="0.6" fill="#ff6b4a"/>
      <rect x="-4.5" y="-0.5" width="1.5" height="2" fill="#ff9a7a"/>
      <rect x="3" y="-0.5" width="1.5" height="2" fill="#ff9a7a"/>
      <circle cx="-1.2" cy="-0.6" r="0.55" fill="#1a0a08"/>
      <circle cx="1.2" cy="-0.6" r="0.55" fill="#1a0a08"/>
      <animateMotion dur="14s" repeatCount="indefinite" rotate="auto">
        <mpath href="#flight"/>
      </animateMotion>
    </g>
  </g>

  <g class="label meta" opacity="0.8">
    <text x="70" y="70">dive</text>
    <text x="140" y="150">diagonal climb</text>
    <text x="180" y="80">saw home</text>
  </g>
</svg>
