<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="100 16 152 144" width="550" height="720">
  <title>Phoenix T1020 - Closed-loop alien pattern 1</title>
  <desc>
    Animated reconstruction of Phoenix ROM table T1020 ($1020-$1060).
    Each pattern byte indexes T1700 for a (dX, dY) pair; each step is held until
    a character-cell border is crossed (net 2x delta for this pattern), forming a closed loop.
  </desc>

  <defs>
    <pattern id="grid" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 8 0 L 0 0 0 8" fill="none" stroke="#1e3a2f" stroke-width="0.4"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <path id="flight"
      d="M 176,40 l -8,0 -8,0 -8,0 -8,0 -8,0 -8,8 0,8 0,8 0,8 0,8 0,8 0,8 0,8 0,8 0,8 0,8 8,8 8,0 8,-8 0,-8 -8,-8 -8,0 -8,8 0,8 8,8 8,0 8,0 8,0 8,0 8,0 8,-8 -8,-8 -8,8 8,8 8,0 8,0 8,0 8,0 8,0 8,-8 0,-8 -8,-8 -8,0 -8,8 0,8 8,8 8,0 8,-8 0,-8 0,-8 0,-8 0,-8 0,-8 0,-8 0,-8 0,-8 0,-8 0,-8 -8,-8 -8,0 -8,0 -8,0 -8,0 -8,0 Z"/>
  </defs>

  <style>
    .label { font-family: "Segoe UI", system-ui, sans-serif; fill: #9ecbb8; }
    .title { font-size: 7px; font-weight: 600; letter-spacing: 0.04em; }
    .meta  { font-size: 4.5px; fill: #6a9a86; }
    .trail {
      fill: none;
      stroke: #3ecf8e;
      stroke-width: 1.1;
      stroke-linejoin: round;
      stroke-linecap: round;
      opacity: 0.85;
      filter: url(#glow);
      stroke-dasharray: 420;
      stroke-dashoffset: 420;
      animation: draw 12s linear infinite;
    }
    @keyframes draw {
      0%   { stroke-dashoffset: 420; opacity: 0.35; }
      8%   { opacity: 0.9; }
      92%  { opacity: 0.9; }
      100% { stroke-dashoffset: 0; opacity: 0.35; }
    }
  </style>

  <rect x="100" y="16" width="152" height="144" fill="#0a1410"/>
  <rect x="112" y="24" width="128" height="120" fill="url(#grid)" stroke="#2a5644" stroke-width="0.6"/>

  <g fill="#cfe8d8" opacity="0.35">
    <circle cx="120" cy="30" r="0.4"/>
    <circle cx="140" cy="50" r="0.3"/>
    <circle cx="200" cy="28" r="0.35"/>
    <circle cx="230" cy="70" r="0.3"/>
    <circle cx="125" cy="130" r="0.35"/>
    <circle cx="215" cy="125" r="0.3"/>
    <circle cx="185" cy="90" r="0.25"/>
    <circle cx="155" cy="110" r="0.3"/>
  </g>

  <text x="116" y="22" class="label title">PHOENIX  -  T1020 PATTERN #1</text>
  <text x="116" y="141" class="label meta">Closed loop - T1700 deltas - cell-boundary steps - $1020-$1060</text>

  <use href="#flight" fill="none" stroke="#1f5c43" stroke-width="1.4" opacity="0.55"/>

  <path class="trail"
    d="M 176,40 l -8,0 -8,0 -8,0 -8,0 -8,0 -8,8 0,8 0,8 0,8 0,8 0,8 0,8 0,8 0,8 0,8 0,8 8,8 8,0 8,-8 0,-8 -8,-8 -8,0 -8,8 0,8 8,8 8,0 8,0 8,0 8,0 8,0 8,-8 -8,-8 -8,8 8,8 8,0 8,0 8,0 8,0 8,0 8,-8 0,-8 -8,-8 -8,0 -8,8 0,8 8,8 8,0 8,-8 0,-8 0,-8 0,-8 0,-8 0,-8 0,-8 0,-8 0,-8 0,-8 0,-8 -8,-8 -8,0 -8,0 -8,0 -8,0 -8,0 Z"/>

  <circle cx="176" cy="40" r="1.6" fill="#f0d878" stroke="#a89030" stroke-width="0.35">
    <title>Start / end (176, 40)</title>
  </circle>
  <text x="180" y="39" class="label meta">start</text>

  <g filter="url(#glow)">
    <g>
      <rect x="-3" y="-2.5" width="6" height="5" rx="0.6" fill="#ff6b4a"/>
      <rect x="-4.5" y="-0.5" width="1.5" height="2" fill="#ff9a7a"/>
      <rect x="3" y="-0.5" width="1.5" height="2" fill="#ff9a7a"/>
      <circle cx="-1.2" cy="-0.6" r="0.55" fill="#1a0a08"/>
      <circle cx="1.2" cy="-0.6" r="0.55" fill="#1a0a08"/>
      <animateMotion dur="12s" repeatCount="indefinite" rotate="auto">
        <mpath href="#flight"/>
      </animateMotion>
    </g>
  </g>

  <g class="label meta" opacity="0.8">
    <text x="130" y="38">&lt;- sweep</text>
    <text x="118" y="95">dive</text>
    <text x="155" y="132">loop / weave</text>
    <text x="210" y="70">climb</text>
  </g>
</svg>
