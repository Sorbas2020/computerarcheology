<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="64 16 184 168" width="550" height="672">
  <title>Phoenix T1100 - Closed-loop alien pattern 5</title>
  <desc>
    Animated reconstruction of Phoenix ROM table T1100 ($1100-$112B).
    Each pattern byte indexes T1700 for a (dX, dY) pair; each step is held until
    a character-cell border is crossed. Opcodes 07-0A use dy=+/-2 so net is 4x delta;
    other |d|=4 opcodes net 2x delta. Forms a closed loop.
  </desc>

  <defs>
    <pattern id="grid" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 8 0 L 0 0 0 8" fill="none" stroke="#1e3a2f" stroke-width="0.4"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Start (96,40); 43 steps; returns to start -->
    <path id="flight"
      d="M 96,40 l 0,8 0,8 0,8 0,8 0,8 0,8 16,8 16,8 16,8 16,8 -16,8 -16,8 16,8 16,8 -16,8 16,8 8,0 8,0 8,0 16,-8 16,-8 16,-8 -8,-8 -8,0 -8,8 0,8 8,8 8,0 8,-8 0,-8 -8,-8 -16,-8 -16,-8 -16,-8 -16,-8 -16,-8 -16,-8 -16,-8 -16,-8 0,-8 0,-8 0,-8 0,-8 Z"/>
  </defs>

  <style>
    .label { font-family: "Segoe UI", system-ui, sans-serif; fill: #9ecbb8; }
    .title { font-size: 7px; font-weight: 600; letter-spacing: 0.04em; }
    .meta  { font-size: 4.5px; fill: #6a9a86; }
    .trail {
      fill: none;
      stroke: #3ecf8e;
      stroke-width: 1.2;
      stroke-linejoin: round;
      stroke-linecap: round;
      opacity: 0.85;
      filter: url(#glow);
      stroke-dasharray: 520;
      stroke-dashoffset: 520;
      animation: draw 13s linear infinite;
    }
    @keyframes draw {
      0%   { stroke-dashoffset: 520; opacity: 0.35; }
      8%   { opacity: 0.9; }
      92%  { opacity: 0.9; }
      100% { stroke-dashoffset: 0; opacity: 0.35; }
    }
  </style>

  <rect x="64" y="16" width="184" height="168" fill="#0a1410"/>
  <rect x="80" y="28" width="160" height="148" fill="url(#grid)" stroke="#2a5644" stroke-width="0.6"/>

  <g fill="#cfe8d8" opacity="0.35">
    <circle cx="90" cy="36" r="0.4"/>
    <circle cx="120" cy="70" r="0.3"/>
    <circle cx="200" cy="40" r="0.35"/>
    <circle cx="230" cy="100" r="0.3"/>
    <circle cx="100" cy="160" r="0.35"/>
    <circle cx="210" cy="165" r="0.3"/>
  </g>

  <text x="84" y="24" class="label title">PHOENIX  -  T1100 PATTERN #5</text>
  <text x="84" y="180" class="label meta">Closed loop - T1700 deltas - cell-boundary steps - $1100-$112B</text>

  <use href="#flight" fill="none" stroke="#1f5c43" stroke-width="1.4" opacity="0.55"/>

  <path class="trail"
    d="M 96,40 l 0,8 0,8 0,8 0,8 0,8 0,8 16,8 16,8 16,8 16,8 -16,8 -16,8 16,8 16,8 -16,8 16,8 8,0 8,0 8,0 16,-8 16,-8 16,-8 -8,-8 -8,0 -8,8 0,8 8,8 8,0 8,-8 0,-8 -8,-8 -16,-8 -16,-8 -16,-8 -16,-8 -16,-8 -16,-8 -16,-8 -16,-8 0,-8 0,-8 0,-8 0,-8 Z"/>

  <circle cx="96" cy="40" r="1.6" fill="#f0d878" stroke="#a89030" stroke-width="0.35">
    <title>Start / end (96, 40)</title>
  </circle>
  <text x="100" y="39" class="label meta">start</text>

  <g filter="url(#glow)">
    <g>
      <rect x="-3" y="-2.5" width="6" height="5" rx="0.6" fill="#ff6b4a"/>
      <rect x="-4.5" y="-0.5" width="1.5" height="2" fill="#ff9a7a"/>
      <rect x="3" y="-0.5" width="1.5" height="2" fill="#ff9a7a"/>
      <circle cx="-1.2" cy="-0.6" r="0.55" fill="#1a0a08"/>
      <circle cx="1.2" cy="-0.6" r="0.55" fill="#1a0a08"/>
      <animateMotion dur="13s" repeatCount="indefinite" rotate="auto">
        <mpath href="#flight"/>
      </animateMotion>
    </g>
  </g>

  <g class="label meta" opacity="0.8">
    <text x="88" y="70">dive</text>
    <text x="145" y="150">zigzag</text>
    <text x="200" y="120">arc right</text>
    <text x="120" y="55">climb home (08)</text>
  </g>
</svg>
